<!DOCTYPE html>
<html>

<head>

    <title>Ponto 24 - Debug</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon.png') }}">

    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: white;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .locker {
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .free {
            background: #2ecc71;
        }

        .occupied {
            background: #f39c12;
        }

        .open {
            background: #e74c3c;
        }

        button {
            margin-top: 6px;
            padding: 6px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .info {
            margin-top: 10px;
            font-size: 12px;
        }
    </style>

</head>

<body>

    <h1>Ponto 24 - Debug Panel</h1>

    <div class="grid" id="grid"></div>

    <script>

        async function loadDebug() {

            const res = await fetch("/api/debug")
            const lockers = await res.json()

            const grid = document.getElementById("grid")

            grid.innerHTML = ""

            lockers.forEach(l => {

                let div = document.createElement("div")

                div.classList.add("locker")
                div.classList.add(l.status)

                let orderInfo = ""

                if (l.order) {

                    orderInfo = `
<div class="info">
Cliente: ${l.order.name}<br>
Email: ${l.order.email}<br>
Código: ${l.order.code}<br>
Status: ${l.order.status}
</div>
`

                }

                div.innerHTML = `

<b>Locker ${l.id}</b><br>
Tamanho: ${l.size}<br>
Estado: ${l.status}

${orderInfo}

<button onclick="setStatus(${l.id},'free')">Free</button>
<button onclick="setStatus(${l.id},'occupied')">Occupied</button>
<button onclick="setStatus(${l.id},'open')">Open</button>
<button onclick="closeLocker(${l.id})">Close</button>

`

                grid.appendChild(div)

            })

        }

        async function setStatus(id, status) {

            await fetch("/debug/set_locker", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    locker_id: id,
                    status: status
                })
            })

            loadDebug()

        }

        loadDebug()

        setInterval(loadDebug, 2000)

        async function closeLocker(id) {

            await fetch("/debug/close_locker", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    locker_id: id
                })
            })

            loadDebug()

        }

    </script>

</body>

</html>
